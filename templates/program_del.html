{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container-fluid">
    <h4 class="page-title">Delete Program</h4>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Confirm Delete</div>
                    <div class="card-category">Warning: This action cannot be undone</div>
                </div>
                <div class="col-md-6">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <p>Are you sure you want to delete "<strong>{{ object.prog_name }}</strong>"?</p>
                            <p class="text-muted">This will also affect related records.</p>
                            <div class="form-group">
                                <button type="submit" class="btn btn-danger btn-rounded">Yes, Delete</button>
                                <a href="{% url 'program-list' %}" class="btn btn-secondary btn-rounded">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
