{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container-fluid">
    <h4 class="page-title">Programs</h4>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        {% if object %}Update Program{% else %}Add New Program{% endif %}
                    </div>
                    <div class="card-category">Program Information</div>
                </div>
                <div class="col-md-6">
                    <div class="card-body">
                        <form method="post" novalidate>
                            {% csrf_token %}
                            {% include 'includes/form.html' %}
                            <div class="form-group">
                                <div class="col-md-12 col-sm-3">
                                    <button type="submit" class="btn btn-primary btn-rounded">Submit</button>
                                    <a href="{% url 'program-list' %}" class="btn btn-secondary btn-rounded">Cancel</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
